name: Deploy AdonisJS

on:
  push:
    branches: [production]
    paths:
      - packages/frontendmu-adonis/**
      - .github/workflows/deploy-adonis.yml

jobs:
  build-and-push:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: packages/frontendmu-adonis
          push: true
          tags: ghcr.io/${{ github.repository }}/adonis:latest

  deploy:
    needs: build-and-push
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      packages: read

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            cd /root/frontend.mu/packages/frontendmu-adonis
            git pull
            echo "$GHCR_TOKEN" | docker login ghcr.io -u github --password-stdin
            docker pull ghcr.io/frontendmu/frontend.mu/adonis:latest
            DOMAIN=coders.mu docker compose up -d
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
